<head>

    <style>
        /* --- 全局设置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft YaHei", sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        
        /* --- 背景特效 --- */
        #galaxy-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .overlay-dark {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 0; pointer-events: none;
        }

        /* --- 导航栏 --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 50px; border-bottom: 1px solid #333;
            background-color: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { font-size: 13px; font-weight: 600; color: #888; letter-spacing: 1px; }
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        
        /* 汉堡菜单 */
        .hamburger { display: none; cursor: pointer; z-index: 102; width: 30px; height: 20px; position: relative; }
        .hamburger span { display: block; width: 100%; height: 2px; background-color: #fff; position: absolute; transition: all 0.3s; }
        .hamburger span:nth-child(1) { top: 0; }
        .hamburger span:nth-child(2) { top: 9px; }
        .hamburger span:nth-child(3) { top: 18px; }
        .hamburger.active span:nth-child(1) { top: 9px; transform: rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { top: 9px; transform: rotate(-45deg); }

        /* --- 内容容器 --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px; position: relative; z-index: 10; }
        .page-header { margin-bottom: 60px; border-left: 4px solid #fff; padding-left: 20px; }
        .page-title { font-size: 40px; font-weight: 700; letter-spacing: -1px; margin-bottom: 10px; }
        .page-subtitle { color: #666; font-family: monospace; font-size: 14px; text-transform: uppercase; }

        /* --- 文章网格 --- */
        .article-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        .article-card {
            background: rgba(20, 20, 20, 0.6); border: 1px solid #333; padding: 30px;
            transition: all 0.4s ease; display: flex; flex-direction: column;
        }
        .article-card:hover { transform: translateY(-5px); border-color: #fff; background: #000; }
        .card-meta { font-size: 12px; color: #666; margin-bottom: 15px; font-family: monospace; }
        .tag { display: inline-block; padding: 2px 8px; border: 1px solid #444; font-size: 10px; margin-right: 8px; }
        .card-title { font-size: 20px; font-weight: 700; margin: 15px 0; line-height: 1.4; }
        .card-excerpt { color: #aaa; font-size: 14px; margin-bottom: 20px; flex-grow: 1; }
        .read-more { color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .article-card:hover .read-more { color: #fff; }

        /* --- 移动端 --- */
        @media (max-width: 768px) {
            header { padding: 20px; justify-content: space-between; }
            .hamburger { display: block; }
            .nav-links {
                position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
                background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px);
                z-index: 101;
                flex-direction: column; justify-content: center; align-items: center; gap: 40px;
                transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                display: flex; 
            }
            .nav-links.active { transform: translateX(0); }
            .nav-links a { font-size: 24px; font-weight: 800; }
            .article-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas id="galaxy-field"></canvas>

        <div class="hamburger">

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">深度分析</h1>
            <p class="page-subtitle">// IN-DEPTH ANALYSIS & RESEARCH</p>

        <div class="article-grid">
            <a href="article-private-llm.html" class="article-card">
                <div class="card-meta"><span>2026.04.18</span><span class="tag">PRIVATE LLM</span></div>
                <h2 class="card-title">企业私有化部署大模型全流程（OpenClaw 实战 + 架构图）</h2>
                <p class="card-excerpt">深度拆解企业级大模型本地化部署全流程，结合 OpenClaw 实战演练与核心网络架构图，一站式解决数据隐私与合规难题。</p>

    <script>
        const canvas = document.getElementById('galaxy-field');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        const particles = [];
        
        class Particle {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.2; this.vy = (Math.random() - 0.5) * 0.2;
                this.size = Math.random() * 1.5; this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0) this.x = width; if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height; if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        
        for (let i = 0; i < 1500; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        window.addEventListener('resize', () => { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; });
        animate();
        
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', () => { hamburger.classList.toggle('active'); navLinks.classList.toggle('active'); });
    </script>
