    <script>
        // 背景粒子效果
        const canvas = document.getElementById('galaxy-field');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        const particles = [];
        const numParticles = 1500;
        
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.2;
                this.vy = (Math.random() - 0.5) * 0.2;
                this.size = Math.random() * 1.5;
                this.alpha = Math.random() * 0.5 + 0.05;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function init() {
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });
        
        init();
        animate();
        
        // 打字机效果
        const subtitles = [
            '理解复杂系统的深层逻辑',
            '洞察 AI 变革中的机遇与陷阱',
            '记录真实的工程判断与决策'
        ];
        let subtitleIndex = 0;
        let charIndex = 0;
        
        function typeSubtitle() {
            const element = document.getElementById('typing-text');
            if (!element) return;
            
            const currentSubtitle = subtitles[subtitleIndex];
            element.textContent = currentSubtitle.slice(0, charIndex);
            
            if (charIndex < currentSubtitle.length) {
                charIndex++;
                setTimeout(typeSubtitle, 100);
            } else {
                setTimeout(() => {
                    subtitleIndex = (subtitleIndex + 1) % subtitles.length;
                    charIndex = 0;
                    typeSubtitle();
                }, 3000);
            }
        }
        
        typeSubtitle();
        
        // 时钟
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `T+${hours}:${minutes}:${seconds}`;
        }
        
        updateClock();
        setInterval(updateClock, 1000);
        
        // 汉堡菜单
        function toggleMenu() {
            const hamburger = document.querySelector('.hamburger');
            const nav = document.querySelector('nav');
            hamburger.classList.toggle('active');
            nav.classList.toggle('active');
        }
        
        document.querySelector('.hamburger').addEventListener('click', toggleMenu);
    </script>
